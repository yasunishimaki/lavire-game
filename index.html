<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配属決定ゲーム｜資料一覧</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
         background: #F8F4FB; color: #333; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #6B3F9E, #9B5FC0);
             color: white; padding: 24px 20px 20px; text-align: center; }
  .header .company { font-size: 13px; opacity: 0.85; margin-bottom: 6px; letter-spacing: 1px; }
  .header h1 { font-size: 22px; font-weight: 700; line-height: 1.4; }
  .header .sub { font-size: 13px; opacity: 0.8; margin-top: 6px; }
  .badge { display: inline-block; background: rgba(255,255,255,0.2);
           border-radius: 20px; padding: 4px 12px; font-size: 12px; margin-top: 10px; }
  .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }
  .section-title { font-size: 12px; color: #888; letter-spacing: 1px;
                   text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
  .card { background: white; border-radius: 16px; margin-bottom: 14px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
          text-decoration: none; display: block; color: inherit;
          transition: transform 0.15s, box-shadow 0.15s; }
  .card:active { transform: scale(0.98); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
  .card-inner { display: flex; align-items: center; padding: 18px 16px; }
  .card-icon { width: 52px; height: 52px; border-radius: 13px;
               display: flex; align-items: center; justify-content: center;
               font-size: 26px; flex-shrink: 0; margin-right: 16px; }
  .card-icon.purple { background: #F0E6FB; }
  .card-icon.blue   { background: #E6F0FB; }
  .card-icon.pink   { background: #FBE6F0; }
  .card-icon.green  { background: #E6FBF0; }
  .card-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
              color: #888; margin-bottom: 4px; }
  .card-title { font-size: 17px; font-weight: 700; line-height: 1.3; color: #222; }
  .card-desc { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.5; }
  .card-arrow { margin-left: auto; color: #CCC; font-size: 18px; padding-left: 8px; }
  .notice { background: #FFF8E6; border-radius: 12px; padding: 14px 16px;
            border-left: 4px solid #F0B429; margin-bottom: 20px; }
  .notice p { font-size: 13px; color: #555; line-height: 1.6; }
  .notice strong { color: #D97706; }
  .footer { text-align: center; padding: 20px; color: #AAA; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="company">株式会社ラヴィール</div>
  <h1>新卒配属決定ゲーム<br>資料ポータル</h1>
  <div class="sub">人事部員役・学生向け</div>
  <div class="badge">2030年度版</div>
</div>

<div class="container">

  <div class="notice">
    <p><strong>使い方：</strong>下の資料をタップして読み込んでください。ゲーム中は随時参照OKです。</p>
  </div>

  <div class="section-title">ゲーム資料</div>

  <a class="card" href="G_rulebook.html">
    <div class="card-inner">
      <div class="card-icon purple">📋</div>
      <div>
        <div class="card-tag">G — まず読む</div>
        <div class="card-title">ルールブック</div>
        <div class="card-desc">ゲームの進め方・6フェーズ・配属ルール</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a class="card" href="I_message.html">
    <div class="card-inner">
      <div class="card-icon blue">🏢</div>
      <div>
        <div class="card-tag">I — 会社情報</div>
        <div class="card-title">代表メッセージ</div>
        <div class="card-desc">会社概要・経営ビジョン・数値目標</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a class="card" href="E_profiles.html">
    <div class="card-inner">
      <div class="card-icon pink">👥</div>
      <div>
        <div class="card-tag">E — 内定者情報</div>
        <div class="card-title">ESプロフィール集</div>
        <div class="card-desc">5名の内定者エントリーシート</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a class="card" href="F_departments.html">
    <div class="card-inner">
      <div class="card-icon green">🗂️</div>
      <div>
        <div class="card-tag">F — 配属先情報</div>
        <div class="card-title">部署ガイドカード集</div>
        <div class="card-desc">9部署の雰囲気・向いている人物像</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

</div>

<div class="footer">株式会社ラヴィール 人事部内限定資料</div>

</body>
</html>
